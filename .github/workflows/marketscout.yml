name: MarketScout

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 1-5"   # 4pm ET weekdays (Mon-Fri)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Telegram secrets
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in repo Secrets."
            exit 1
          fi

      - name: Run screener (scan + send Rising Stars & Big Ones)
        run: python run_screener.py --mode scan
