# Screener: daily $ volume > 250M; 3-of-4 criteria (3%, 5%, 15%, 30%) same sign
min_dollar_volume: 250000000   # $250M
rising_stars_max_dollar_volume: 1000000000  # $1B for Rising Stars (< 1B)
big_ones_min_dollar_volume: 1000000000      # $1B for Big Ones (>= 1B)

thresholds:
  d1: 3.0
  d7: 5.0
  d30: 15.0
  d90: 30.0

exchanges:
  - NYSE
  - NASDAQ

paths:
  data_dir: data
  logs_dir: logs
